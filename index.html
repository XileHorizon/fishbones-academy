<!doctype html>
<html lang="en" data-theme="dark" data-theme-name="default-dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon + apple-touch-icon. `?v=` is a cache-bust knob —
         browsers cache the favicon aggressively (often surviving
         hard reloads), so bumping this on any icon swap forces
         returning visitors to refetch on their next page load.
         Bump the number whenever /favicon.png changes. -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <title>Libre — Turn any technical book into a course</title>
    <meta
      name="description"
      content="Libre is an interactive coding course platform. Read prose, write code, watch tests grade you. Sixteen languages, no setup, no accounts. Free and open source."
    />
    <meta property="og:title" content="Libre" />
    <meta
      property="og:description"
      content="Turn any technical book into a course you can ship code in. Sixteen languages, runs in your browser or as a desktop app."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://libre.academy/" />
    <meta property="og:image" content="https://libre.academy/favicon.png" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
