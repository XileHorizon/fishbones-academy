<!doctype html>
<html lang="en" data-theme="dark" data-theme-name="default-dark">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon + apple-touch-icon. `?v=` is a cache-bust knob —
         browsers cache the favicon aggressively (often surviving
         hard reloads), so bumping this on any icon swap forces
         returning visitors to refetch on their next page load.
         Bump the number whenever /favicon.png changes. -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" href="/favicon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />

    <!-- SEO: head terms target the "free interactive coding
         courses" query family (Codecademy / freeCodeCamp / Scrimba
         compete here). Body of the description mentions the
         differentiator (26 languages, ingest your own books, runs
         in-browser AND as a desktop app, no signup wall) so the
         snippet still reads as substantive rather than keyword
         stuffing. Title pattern is "<Brand> — <head term> · <hook>"
         — most search UIs truncate around 60-70 chars, so the head
         term sits before the truncation budget runs out. -->
    <!-- Title pattern: head keyword first, brand last. "Learn to
         code free" is the primary keyword we're chasing — placing it
         at the start matches it 1:1 with the H1 below the fold and
         survives SERP truncation (~60-70 chars). The two numbers
         (courses, languages) sit before the truncation budget so the
         differentiator carries even in a clipped preview. -->
    <title>Learn to code free — 90+ courses, 26 languages | Libre Academy</title>
    <meta
      name="description"
      content="Open-source coding courses with a real editor and hidden tests. 26 languages, 90+ courses, zero paywall. The free alternative to Codecademy."
    />
    <meta
      name="keywords"
      content="learn to code free, free coding courses, open source codecademy alternative, interactive coding lessons, learn programming online, free programming courses, learn JavaScript, learn Python, learn Rust, learn Solidity, code editor in browser, no paywall coding"
    />
    <link rel="canonical" href="https://libre.academy/" />

    <!-- Open Graph: same head term up front, lede emphasises the
         "free + open source + 26 languages" combo so link-unfurl
         previews on Twitter / Discord / Slack carry the
         differentiator. Codecademy named in the description so the
         "codecademy alternative" search intent lands a hit even on
         shared links. -->
    <meta property="og:site_name" content="Libre Academy" />
    <meta property="og:title" content="Learn to code free — 90+ courses, 26 languages | Libre Academy" />
    <meta
      property="og:description"
      content="Open-source coding courses with a real editor and hidden tests. 26 languages, zero paywall, no signup. The free alternative to Codecademy."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://libre.academy/" />
    <meta property="og:image" content="https://libre.academy/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://libre.academy/og.png" />
    <meta name="twitter:title" content="Learn to code free — 90+ courses, 26 languages | Libre Academy" />
    <meta
      name="twitter:description"
      content="Open-source coding courses with a real editor and hidden tests. 26 languages, zero paywall. The free alternative to Codecademy."
    />

    <!-- JSON-LD structured data — helps search engines understand
         this is an educational platform with a course catalog.
         EducationalOrganization is the strongest schema match for a
         free-courses site; the WebSite + SearchAction enables the
         in-Google search-box affordance on branded queries. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "EducationalOrganization",
            "name": "Libre Academy",
            "url": "https://libre.academy/",
            "logo": "https://libre.academy/libre_app_icon.png",
            "description": "Learn to code free. 90+ open-source coding courses across 26 languages — real editor, hidden tests, zero paywall. The free alternative to Codecademy.",
            "sameAs": ["https://github.com/InfamousVague/Libre.academy"]
          },
          {
            "@type": "WebSite",
            "name": "Libre Academy",
            "url": "https://libre.academy/",
            "potentialAction": {
              "@type": "SearchAction",
              "target": "https://libre.academy/courses?q={search_term_string}",
              "query-input": "required name=search_term_string"
            }
          }
        ]
      }
    </script>

    <!-- Self-hosted Plausible analytics. Privacy-friendly (no
         cookies, no fingerprinting, no PII) so it doesn't need a
         consent banner. `script.outbound-links.js` auto-fires the
         initial pageview and tracks outbound clicks; SPA route
         changes are fired manually from React (see `src/lib/
         analytics.ts` + the route-change effect in App.tsx).
         Keeping the script on our own subdomain (`stats.libre.
         academy`) means no third-party cookies, no ad-blocker
         false positives, and corporate firewalls only need to
         whitelist one host. -->
    <script
      defer
      data-domain="libre.academy"
      src="https://stats.libre.academy/js/script.outbound-links.js"
    ></script>
    <!-- Plausible's standard early-call buffer. Lets us call
         `window.plausible("pageview")` from React before the
         deferred script finishes loading — early calls queue on
         `plausible.q` and the real implementation flushes them
         once it installs itself. Without this, any pageview the
         router fires during the script-load window is lost. -->
    <script>
      window.plausible =
        window.plausible ||
        function () {
          (window.plausible.q = window.plausible.q || []).push(arguments);
        };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
