server {
    listen 80;
    server_name libre.academy www.libre.academy;
    root /var/www/libre.academy;

    # Serve static files directly — robots.txt, sitemap.xml, images, etc.
    # This MUST come before the SPA fallback below.
    location ~* \.(txt|xml|png|jpg|jpeg|gif|ico|svg|woff|woff2|js|css|json)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # SPA fallback — everything else routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
